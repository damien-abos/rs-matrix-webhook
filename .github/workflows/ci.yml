name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked
      - run: cargo clippy --locked -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-webhook-linux-amd64
          path: target/release/matrix-webhook
          retention-days: 7

  docker:
    name: Docker build (amd64 + arm64)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      # QEMU is required only for the distroless runtime image manifest
      # resolution; the build stage itself cross-compiles natively via Zig.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: rs-matrix-webhook:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
